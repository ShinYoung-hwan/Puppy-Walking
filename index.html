<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>리트리버 퍼피워킹 시뮬레이션</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="floating-paws paws-left">🐾 ✨ 🐾</div>
  <div class="floating-paws paws-right">✨ 🐾 ✨</div>

  <header class="app-header">
    <div class="title-wrap">
      <p class="title-badge">PUPPY WALKING</p>
      <h1>리트리버 퍼피워킹 시뮬레이션</h1>
      <p class="title-desc">작고 귀여운 발걸음이, 누군가의 든든한 길잡이가 되기까지</p>
    </div>

    <div class="header-progress">
      <div class="progress-label">
        <span>성장도</span>
        <span id="growthText">0 / 7</span>
      </div>
      <div class="progress-bar" aria-label="성장 진행도">
        <div id="progressFill" class="progress-fill"></div>
      </div>
    </div>
  </header>

  <div id="toastMessage" class="toast" aria-live="polite"></div>

  <main class="game-shell">
    <section class="puppy-card">
      <div class="puppy-glow"></div>

      <div id="puppyStatus" class="puppy-status">
        🐶 [어린 강아지 | 신남] 꼬리를 붕붕 흔들며 네 주변을 맴돈다!
      </div>

      <div class="puppy-visual-wrap">
        <img id="puppyImage" class="puppy-image" alt="선택한 강아지 이미지" />
      </div>

      <div id="puppySubEmotion" class="puppy-sub-emotion">
        (강아지가 반짝이는 눈으로 올려다본다 ✨)
      </div>
    </section>

    <section class="panel action-panel main-panel">
      <div class="panel-heading">
        <h2>[퀘스트 선택]</h2>
        <p>리트리버와 함께 오늘의 퀘스트를 진행해 보세요.</p>
      </div>
      <div id="actionArea"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
